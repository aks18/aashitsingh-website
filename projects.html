<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Aashit Singh - Projects</title>

    <link rel="stylesheet" href="styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind-config.js"></script>
  </head>
  <body
    class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col pt-24 pb-20 md:pb-0 overflow-x-hidden custom-scrollbar"
  >
    <site-header active-page="projects"></site-header>

    <main
      class="flex-grow w-full max-w-7xl mx-auto px-6 md:px-8 py-12 flex flex-col gap-12 animate-fade-in-up"
    >
      <section>
        <h2
          class="font-headline text-5xl md:text-7xl font-bold text-primary tracking-tighter mb-4 text-glow-primary"
        >
          Engineering Portfolio<span class="text-primary-container">.</span>
        </h2>
        <p
          class="font-body text-lg md:text-xl text-on-surface-variant max-w-2xl leading-relaxed"
        >
          A selection of high-performance systems, ranging from distributed data
          pipelines to predictive machine learning architectures.
        </p>
      </section>

      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        id="projects-grid"
      ></div>
    </main>

    <site-footer></site-footer>
    <mobile-nav active-page="projects"></mobile-nav>

    <script src="scripts.js"></script>
  </body>
</html>
