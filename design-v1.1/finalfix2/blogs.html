<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aashit Singh - Blogs</title>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind-config.js"></script>
</head>
<body class="bg-[#0A0A0A] text-on-background font-body antialiased min-h-screen flex flex-col pt-24 pb-20 md:pb-0 overflow-x-hidden custom-scrollbar">

    <site-header active-page="blogs"></site-header>

    <main class="flex-grow w-full max-w-screen-2xl mx-auto px-6 md:px-12 lg:px-24 py-12 flex flex-col gap-16">
        
        <section class="flex flex-col gap-6 animate-fade-in-up">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter text-primary leading-tight text-glow-primary">
                Editorial<span class="text-primary-container">.</span>
            </h1>
            <p class="text-lg md:text-xl text-on-surface-variant max-w-2xl leading-relaxed">
                Exploring the intersections of artificial intelligence, complex systems engineering, and the narratives hidden within massive datasets.
            </p>
        </section>

        <div id="featured-post-container"></div>

        <section id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-fade-in-up" style="animation-delay: 0.2s;">
            </section>

        <section class="mt-12 py-16 border-t border-surface-container-high animate-fade-in-up" style="animation-delay: 0.3s;">
            <div class="max-w-xl mx-auto text-center flex flex-col gap-6">
                <h3 class="text-2xl font-bold text-primary">Receive the Illuminated Editorial</h3>
                <p class="text-sm text-on-surface-variant">Infrequent, high-signal essays on engineering and AI.</p>
                <form class="flex flex-col sm:flex-row gap-4 mt-4 w-full">
                    <input class="flex-grow bg-transparent border-b border-outline-variant focus:border-primary-container focus:outline-none focus:ring-0 text-primary py-3 transition-colors rounded-none placeholder:text-surface-variant text-sm" placeholder="Your email address" type="email"/>
                    <button class="bg-primary-container text-on-primary-container font-bold px-8 py-3 rounded text-sm hover:opacity-90 transition-opacity whitespace-nowrap" type="submit">Subscribe</button>
                </form>
            </div>
        </section>
    </main>

    <site-footer></site-footer>
    <mobile-nav active-page="blogs"></mobile-nav>

    <script src="scripts.js"></script>
</body>
</html>
